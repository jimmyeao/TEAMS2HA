name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            label: x64
          - target: aarch64-pc-windows-msvc
            label: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: tauri

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri
          tagName: ${{ github.ref_name }}
          releaseName: Teams2HA ${{ github.ref_name }}
          releaseBody: |
            ## Installation
            Download the installer for your architecture and run it.
            No administrator rights required — installs per-user to `%LOCALAPPDATA%`.

            | File | Architecture |
            |------|-------------|
            | `Teams2HA_*_x64-setup.exe` | Intel / AMD (most PCs) |
            | `Teams2HA_*_arm64-setup.exe` | ARM64 (Surface Pro X, Copilot+ PCs) |

            If you previously had the .NET version installed, it will be automatically
            removed on first launch of the new version.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

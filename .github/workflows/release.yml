name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci
        working-directory: tauri

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri
          tagName: ${{ github.ref_name }}
          releaseName: Teams2HA ${{ github.ref_name }}
          releaseBody: |
            ## Installation
            Download `Teams2HA_*_x64-setup.exe` and run it.
            No administrator rights required — installs per-user to `%LOCALAPPDATA%`.

            If you previously had the .NET version installed, it will be automatically
            removed on first launch of the new version.
          releaseDraft: false
          prerelease: false

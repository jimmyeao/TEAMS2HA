name: Rust Security Audit

on:
  push:
    branches: [ "master" ]
    paths:
      - 'tauri/src-tauri/**'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'tauri/src-tauri/**'
  schedule:
    - cron: '30 4 * * 1'
  workflow_dispatch:

jobs:
  audit:
    name: cargo audit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run audit
        working-directory: tauri/src-tauri
        # Ignored advisories are all for rustls-webpki 0.102.8, pinned by Tauri's
        # own dependency tree. The patched version (0.103.13) is also resolved; only
        # the 0.102.x copy we cannot control remains vulnerable. Will un-ignore when
        # Tauri drops the 0.102.x constraint upstream.
        run: >
          cargo audit
          --ignore RUSTSEC-2026-0049
          --ignore RUSTSEC-2026-0098
          --ignore RUSTSEC-2026-0099
          --ignore RUSTSEC-2026-0104

  clippy:
    name: cargo clippy
    runs-on: windows-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target

      - name: Run clippy
        working-directory: tauri/src-tauri
        run: cargo clippy --all-targets -- -D warnings
